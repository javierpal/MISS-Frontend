<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <div class="confirm-dialog__message">{{ data.message }}</div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  @if (data.showCancel !== false) {
    <button mat-stroked-button (click)="onCancel()">
      {{ data.cancelText || 'Cancelar' }}
    </button>
  }
  <button
    mat-flat-button
    [color]="data.type === 'danger' ? 'warn' : data.type === 'success' ? 'primary' : 'primary'"
    (click)="onConfirm()"
    autofocus>
    {{ data.confirmText || 'Aceptar' }}
  </button>
</mat-dialog-actions>
