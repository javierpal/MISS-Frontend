<h2 mat-dialog-title>Ajuste de Stock</h2>

<mat-dialog-content>
  <form [formGroup]="adjustmentForm" class="adjustment-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Producto ID</mat-label>
      <input matInput [value]="data.productId" disabled />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Cantidad (ej: 5 o -3)</mat-label>
      <input matInput type="number" formControlName="adjustment" placeholder="Ej: 5 o -3" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Motivo del ajuste</mat-label>
      <input matInput formControlName="reason" placeholder="Motivo del ajuste" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Referencia</mat-label>
      <input matInput formControlName="reference" placeholder="Ref." />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nota</mat-label>
      <input matInput formControlName="note" placeholder="Nota" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions class="dialog-actions">
  <button mat-stroked-button (click)="onCancel()" [disabled]="submitting">Cancelar</button>
  <button mat-flat-button color="accent" (click)="onSubmit()" [disabled]="submitting">
    {{ submitting ? 'Guardando...' : 'Guardar' }}
  </button>
</mat-dialog-actions>
