<div class="inventory-container">
  <h1>Inventario</h1>

  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title>Stock Actual</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="toolbar">
        <button mat-flat-button color="primary" (click)="loadStock()" [disabled]="loading">
          <mat-icon>refresh</mat-icon> Actualizar
        </button>
      </div>

      <div *ngIf="loading" class="loading-wrapper">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <table mat-table [dataSource]="stockData" *ngIf="!loading && stockData.length">
        <!-- Product Name -->
        <ng-container matColumnDef="productName">
          <th mat-header-cell *matHeaderCellDef>Producto</th>
          <td mat-cell *matCellDef="let row">{{ row.productName }}</td>
        </ng-container>

        <!-- SKU -->
        <ng-container matColumnDef="sku">
          <th mat-header-cell *matHeaderCellDef>SKU</th>
          <td mat-cell *matCellDef="let row">{{ row.sku }}</td>
        </ng-container>

        <!-- Total Stock -->
        <ng-container matColumnDef="totalStock">
          <th mat-header-cell *matHeaderCellDef>Stock</th>
          <td mat-cell *matCellDef="let row" [class.out-of-stock]="row.isOutOfStock">
            {{ row.totalStock }}
          </td>
        </ng-container>

        <!-- Low Stock Threshold -->
        <ng-container matColumnDef="lowStockThreshold">
          <th mat-header-cell *matHeaderCellDef>Mín</th>
          <td mat-cell *matCellDef="let row">{{ row.lowStockThreshold }}</td>
        </ng-container>

        <!-- Status -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let row">
            <span class="status-dot" [style.background]="getStatusColor(row)"></span>
            {{ getStatusText(row) }}
          </td>
        </ng-container>

        <!-- Lots Active -->
        <ng-container matColumnDef="lotsActive">
          <th mat-header-cell *matHeaderCellDef>Lotes</th>
          <td mat-cell *matCellDef="let row">{{ row.lotsActive }}</td>
        </ng-container>

        <!-- Next Expiry -->
        <ng-container matColumnDef="nextExpiry">
          <th mat-header-cell *matHeaderCellDef>Próx. Venc.</th>
          <td mat-cell *matCellDef="let row">{{ row.nextExpiry | date:'shortDate' }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div *ngIf="!loading && !stockData.length" class="empty-state">
        <mat-icon>inventory_2</mat-icon>
        <p>No hay registros de stock disponibles.</p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
