<div class="barcode-input">
  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="barcode-input__field">
    <mat-icon matPrefix>qr_code_scanner</mat-icon>
    <mat-label>{{ label() }}</mat-label>
    <input
      matInput
      type="text"
      [(ngModel)]="barcode"
      [placeholder]="placeholder()"
      (keyup.enter)="onBarcodeSubmit()"
    />
  </mat-form-field>

  <button
    mat-raised-button
    color="primary"
    class="barcode-input__search-btn"
    (click)="onSearchProducts()"
  >
    <mat-icon>search</mat-icon>
    <span class="barcode-input__search-text">Búsqueda</span>
  </button>
</div>
