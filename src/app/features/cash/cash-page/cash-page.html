<div class="cash-page">
  <!-- Header -->
  <app-page-header title="Caja" subtitle="Gestión de caja y arqueos" icon="account_balance">
  </app-page-header>

  <!-- Main content -->
  <div class="cash-page__content">
    <mat-card class="cash-page__info-card" appearance="outlined">
      <mat-card-content>
        <div class="cash-page__info-icon">
          <mat-icon>account_balance</mat-icon>
        </div>
        <div class="cash-page__info-text">
          <h2 class="cash-page__info-title">Gestión de Caja</h2>
          <p class="cash-page__info-description">
            Visualiza el estado actual de la caja, registra movimientos y realiza arqueos.
          </p>
        </div>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-stroked-button (click)="onOpenCashCurrent()">
          <mat-icon>open_in_new</mat-icon>
          Ver caja actual
        </button>
        <button mat-flat-button color="primary" (click)="onOpenCash()">
          <mat-icon>lock_open</mat-icon>
          Abrir caja
        </button>
      </mat-card-actions>
    </mat-card>

    <!-- Action buttons -->
    <div class="cash-page__actions">
      <button mat-stroked-button (click)="onRegisterMovement()">
        <mat-icon>add</mat-icon>
        Registrar movimiento
      </button>
      <button mat-stroked-button color="accent" (click)="onGoToClose()">
        <mat-icon>close</mat-icon>
        Ir a cierre
      </button>
    </div>

    <!-- Info banner -->
    <div class="cash-page__info-banner">
      <mat-icon>info</mat-icon>
      <span>Ver el estado actual de la caja, movimientos y resumen operativo.</span>
    </div>
  </div>
</div>
